name: Mailer Deploy

on:
  workflow_run:
    workflows: ["Mailer CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: mailer-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy mailer to VPS
    runs-on: [self-hosted, linux, x64, freela-mailer-vps]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    environment:
      name: production
    permissions:
      contents: read
    env:
      VPS_APP_DIR: ${{ secrets.MAILER_VPS_APP_DIR || secrets.VPS_APP_DIR || '/root/freela-mailer' }}
      DEPLOY_BRANCH: main
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      HEALTHCHECK_URL: ${{ secrets.MAILER_DEPLOY_HEALTHCHECK_URL || secrets.DEPLOY_HEALTHCHECK_URL }}

    steps:
      - name: Validate deploy path
        run: |
          set -euo pipefail
          if [ -z "${VPS_APP_DIR:-}" ]; then
            echo "::error::VPS_APP_DIR is empty"
            exit 1
          fi
          mkdir -p "$VPS_APP_DIR"

      - name: Deploy in-place on VPS
        run: |
          set -euo pipefail
          cd "$VPS_APP_DIR"

          if [ ! -d .git ]; then
            echo "==> Bootstrapping git repo in $VPS_APP_DIR"
            git init
            git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          fi

          git config --global --add safe.directory "$VPS_APP_DIR"
          echo "==> Repo: $(pwd)"
          echo "==> Origin: $(git remote get-url origin)"
          echo "==> Git status before sync:"
          git status --short || true

          # Force-sync to remote branch.
          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"

          CURRENT_SHA="$(git rev-parse HEAD)"
          echo "==> Checked out SHA: $CURRENT_SHA"
          if [ -n "${EXPECTED_SHA:-}" ] && [ "$CURRENT_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Deployed SHA mismatch. Expected $EXPECTED_SHA, got $CURRENT_SHA"
            exit 1
          fi

          cd deploy
          COMPOSE="docker compose -p freela-mailer -f docker-compose.yml"

          echo "==> Building mailer images..."
          $COMPOSE build app worker

          echo "==> Rolling update (app + worker)..."
          if ! $COMPOSE up -d --no-deps --wait --wait-timeout 500 app worker; then
            echo "::error::docker compose up failed"
            $COMPOSE logs --tail=150 app worker
            exit 1
          fi

          echo "==> Running Prisma migrate deploy..."
          $COMPOSE exec -T app npm run prisma:migrate:deploy

          echo "==> Service status"
          $COMPOSE ps

      - name: Health check
        if: env.HEALTHCHECK_URL != ''
        run: |
          set -euo pipefail
          for i in $(seq 1 10); do
            if curl --fail --show-error --silent --max-time 10 "$HEALTHCHECK_URL" > /dev/null 2>&1; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i/10 failed, retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 10 attempts"
          exit 1
